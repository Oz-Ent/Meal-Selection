name: Integration Test

on:
  pull_request:
    branches:
     main
    
jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm

      - run: npm ci
      - run: npm run build --if-present

      - name: Run Cypress test
        run: npx start-server-and-test preview http://localhost:4173 "cypress run --config baseUrl=http://localhost:4173" 